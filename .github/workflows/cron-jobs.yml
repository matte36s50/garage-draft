name: Auction Cron Jobs

on:
  schedule:
    - cron: '0,30 * * * *'   # every 30 min  → finalize-auctions
    - cron: '0 * * * *'       # every hour    → update-performance + finalize-auctions
  workflow_dispatch:           # manual trigger from GitHub Actions UI

jobs:
  finalize-auctions:
    name: Finalize Auction Prices
    runs-on: ubuntu-latest
    steps:
      - name: Scrape BaT sold prices
        run: |
          curl -sf -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://bid-prix-admin.vercel.app/api/cron/finalize-auctions" \
            | jq '{processed, stats, successRate}' || true

  update-performance:
    name: Update Performance Snapshots
    runs-on: ubuntu-latest
    # Only run on the top-of-hour schedule or manual trigger
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 * * * *'
    steps:
      - name: Capture performance snapshot
        run: |
          curl -sf -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://bid-prix-admin.vercel.app/api/cron/update-performance" \
            | jq '{message: .message}' || true
